<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Comercial - Connect Minds</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel para traduzir o código React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Personalização simples da barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden">
    
    <!-- Elemento onde o React vai injetar o App -->
    <div id="root"></div>

    <!-- Código React -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const logoUrl = "https://i.postimg.cc/BbPsHBL4/3.png";

        function App() {
            const [activeTab, setActiveTab] = useState('inicio');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                setIsVisible(false);
                const timer = setTimeout(() => setIsVisible(true), 50);
                return () => clearTimeout(timer);
            }, [activeTab]);

            const navLinks = [
                { id: 'inicio', name: 'Início', icon: 'fa-solid fa-house' },
                { id: 'sobre', name: 'Sobre Nós', icon: 'fa-solid fa-users' },
                { id: 'desafio', name: 'O Desafio', icon: 'fa-solid fa-bullseye' },
                { id: 'solucao', name: 'A Solução', icon: 'fa-solid fa-lightbulb' },
                { id: 'investimento', name: 'Investimento', icon: 'fa-solid fa-dollar-sign' },
                { id: 'porque', name: 'Por que nós?', icon: 'fa-solid fa-award' },
            ];

            const handleNavClick = (id) => {
                setActiveTab(id);
                setIsMobileMenuOpen(false);
            };

            return (
                <div className="flex h-screen w-full">
                
                {/* ================= SIDEBAR (DESKTOP) ================= */}
                <aside className="hidden md:flex flex-col w-72 bg-white border-r border-slate-200 shadow-sm z-20">
                    <div className="p-6 border-b border-slate-100 flex items-center justify-center">
                    <img 
                        src={logoUrl} 
                        alt="Connect Minds Logo" 
                        className="h-12 w-auto object-contain"
                        onError={(e) => {
                        e.target.onerror = null;
                        e.target.style.display = 'none';
                        }}
                    />
                    </div>

                    <div className="flex-1 overflow-y-auto py-6">
                    <p className="px-6 text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Navegação da Proposta</p>
                    <nav className="space-y-1 px-3">
                        {navLinks.map((link) => {
                        const isActive = activeTab === link.id;
                        return (
                            <button
                            key={link.id}
                            onClick={() => handleNavClick(link.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-left font-semibold ${
                                isActive 
                                ? 'bg-[#1B4381]/5 text-[#1B4381] shadow-sm border border-[#1B4381]/10' 
                                : 'text-slate-500 hover:bg-slate-50 hover:text-[#1B4381]'
                            }`}
                            >
                            <i className={`${link.icon} w-5 text-center ${isActive ? 'text-[#F7D525]' : 'text-slate-400'}`}></i>
                            {link.name}
                            {isActive && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-[#1B4381]"></div>}
                            </button>
                        );
                        })}
                    </nav>
                    </div>

                    <div className="p-6 border-t border-slate-100 bg-slate-50">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-[#1B4381] flex items-center justify-center text-white font-bold">L</div>
                        <div>
                        <p className="text-sm font-bold text-[#1B4381]">Cliente Lopti</p>
                        <p className="text-xs text-slate-500">Proposta Exclusiva</p>
                        </div>
                    </div>
                    </div>
                </aside>

                {/* ================= MOBILE HEADER ================= */}
                <div className="md:hidden fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 shadow-sm z-30 flex items-center justify-between px-4">
                    <img src={logoUrl} alt="Logo" className="h-8 object-contain" />
                    <button
                    onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                    className="p-2 rounded-lg text-[#1B4381] bg-slate-50 border border-slate-200 focus:outline-none"
                    >
                    <i className={isMobileMenuOpen ? "fa-solid fa-xmark text-xl" : "fa-solid fa-bars text-xl"}></i>
                    </button>
                </div>

                {/* MOBILE MENU OVERLAY */}
                {isMobileMenuOpen && (
                    <div className="md:hidden fixed inset-0 z-20 bg-black/20 backdrop-blur-sm mt-16">
                    <div className="bg-white h-full w-full shadow-xl flex flex-col">
                        <nav className="p-4 space-y-2">
                        {navLinks.map((link) => {
                            const isActive = activeTab === link.id;
                            return (
                            <button
                                key={link.id}
                                onClick={() => handleNavClick(link.id)}
                                className={`w-full flex items-center gap-4 px-4 py-4 rounded-xl transition-all duration-200 text-left font-bold text-lg ${
                                isActive 
                                    ? 'bg-[#1B4381]/5 text-[#1B4381] border border-[#1B4381]/10' 
                                    : 'text-slate-600 hover:bg-slate-50'
                                }`}
                            >
                                <i className={`${link.icon} w-6 text-center text-xl ${isActive ? 'text-[#F7D525]' : 'text-slate-400'}`}></i>
                                {link.name}
                            </button>
                            );
                        })}
                        </nav>
                    </div>
                    </div>
                )}

                {/* ================= MAIN CONTENT AREA ================= */}
                <main className="flex-1 overflow-y-auto bg-slate-50/50 relative pt-16 md:pt-0">
                    <div className={`transition-opacity duration-300 ease-in-out w-full h-full ${isVisible ? 'opacity-100' : 'opacity-0'}`}>
                    
                    {/* CONTEÚDO: INÍCIO */}
                    {activeTab === 'inicio' && (
                        <div className="min-h-full flex flex-col justify-center p-6 md:p-12 lg:p-20 relative">
                        <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] mix-blend-multiply pointer-events-none"></div>
                        <div className="max-w-4xl relative z-10">
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white text-[#1B4381] text-sm font-bold mb-8 border border-slate-200 shadow-sm">
                            <span className="w-2.5 h-2.5 rounded-full bg-[#F7D525] animate-pulse"></span>
                            Documento Confidencial
                            </div>
                            <h1 className="text-4xl md:text-5xl lg:text-7xl font-extrabold leading-tight mb-6 text-[#1B4381] tracking-tight">
                            Estratégia Integrada para <span className="relative inline-block"><span className="relative z-10 text-[#1B4381]">Posicionamento</span><span className="absolute bottom-2 left-0 w-full h-4 bg-[#F7D525]/40 -z-0 rounded-sm"></span></span>
                            </h1>
                            <p className="text-xl md:text-2xl text-slate-600 mb-12 max-w-2xl leading-relaxed">
                            Conectando a sua marca aos resultados que procura. Desenvolvido especialmente para a <strong className="text-[#1B4381]">Lopti</strong>.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row gap-6">
                            <div className="bg-white shadow-md border border-slate-100 rounded-2xl p-6 flex items-center gap-5 w-full sm:w-auto">
                                <div className="bg-[#1B4381]/5 p-4 rounded-xl">
                                <i className="fa-solid fa-desktop text-2xl text-[#1B4381]"></i>
                                </div>
                                <div>
                                <p className="text-sm font-semibold text-slate-400 uppercase tracking-wider">Apresentado a</p>
                                <p className="font-extrabold text-2xl text-[#1B4381]">Lopti</p>
                                </div>
                            </div>
                            <div className="bg-white shadow-md border border-slate-100 rounded-2xl p-6 flex items-center gap-5 w-full sm:w-auto">
                                <div className="bg-[#F7D525]/20 p-4 rounded-xl">
                                <i className="fa-solid fa-table-columns text-2xl text-[#1B4381]"></i>
                                </div>
                                <div>
                                <p className="text-sm font-semibold text-slate-400 uppercase tracking-wider">Data</p>
                                <p className="font-extrabold text-2xl text-[#1B4381]">13 Mar 2026</p>
                                </div>
                            </div>
                            </div>

                            <div className="mt-16">
                            <button 
                                onClick={() => handleNavClick('sobre')}
                                className="inline-flex items-center gap-2 text-[#1B4381] font-bold hover:text-yellow-600 transition-colors group"
                            >
                                Iniciar leitura da proposta <i className="fa-solid fa-arrow-right text-lg group-hover:translate-x-1 transition-transform ml-2"></i>
                            </button>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* CONTEÚDO: SOBRE NÓS */}
                    {activeTab === 'sobre' && (
                        <div className="p-6 md:p-12 lg:p-20 max-w-7xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-[#1B4381] text-white text-xs font-bold uppercase tracking-wider mb-6">
                            A Agência
                        </div>
                        <h2 className="text-3xl md:text-4xl font-extrabold text-[#1B4381] mb-12">Quem é a Connect Minds?</h2>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                            <div>
                            <p className="text-slate-600 mb-6 text-lg leading-relaxed">
                                A Connect Minds nasceu de uma convicção simples: marketing digital eficaz vai muito além de estar presente nas redes sociais ou fazer posts. É sobre criar conexões genuínas que transformam audiência em comunidade e seguidores em clientes fiéis.
                            </p>
                            <p className="text-slate-600 mb-10 text-lg leading-relaxed">
                                Fundada por Laércio Prates, profissional com mais de 10 anos de expertise em vendas e marketing, representamos a evolução natural de uma jornada dedicada a entender profundamente as necessidades de cada cliente.
                            </p>
                            
                            <div className="space-y-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-5">
                                <div className="flex-shrink-0">
                                    <div className="w-12 h-12 bg-[#F7D525]/20 rounded-xl flex items-center justify-center">
                                    <i className="fa-solid fa-bullseye text-xl text-[#1B4381]"></i>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold text-[#1B4381] mb-2">A Nossa Missão</h3>
                                    <p className="text-slate-600 leading-relaxed">Conectar a mente dos nossos clientes à mente dos seus clientes ideais, criando estratégias personalizadas através de uma abordagem humanizada, estratégica e autêntica.</p>
                                </div>
                                </div>
                                
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-5">
                                <div className="flex-shrink-0">
                                    <div className="w-12 h-12 bg-[#1B4381]/10 rounded-xl flex items-center justify-center">
                                    <i className="fa-solid fa-users text-xl text-[#1B4381]"></i>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold text-[#1B4381] mb-2">A Nossa Abordagem</h3>
                                    <p className="text-slate-600 leading-relaxed">Para posicionar a Lopti como a referência absoluta no mercado, sabemos que não basta o esforço isolado de 1 ou 2 profissionais a fazer o básico. É indispensável o poder de uma <strong>equipe de especialistas a trabalhar em perfeita sintonia</strong>. Não somos apenas mais uma agência de marketing digital. Somos os seus parceiros estratégicos de crescimento. <strong className="text-[#1B4381]">O seu sucesso é o nosso sucesso.</strong></p>
                                </div>
                                </div>
                            </div>
                            </div>

                            {/* Box de Vantagens */}
                            <div>
                            <div className="bg-[#1B4381] rounded-3xl p-8 md:p-10 shadow-xl text-white relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                                
                                <h3 className="text-2xl font-bold mb-8 text-[#F7D525]">Por que uma Agência faz a Diferença?</h3>
                                <ul className="space-y-6 relative z-10">
                                <li className="flex items-start gap-4">
                                    <i className="fa-solid fa-circle-check text-xl text-[#F7D525] flex-shrink-0 mt-1"></i>
                                    <div>
                                    <strong className="block text-lg mb-1">Estratégia vs. Improviso</strong>
                                    <span className="text-sm text-blue-200 leading-relaxed">Planejamento baseado em dados e análise de mercado em vez de apenas postar conteúdo.</span>
                                    </div>
                                </li>
                                <li className="flex items-start gap-4">
                                    <i className="fa-solid fa-circle-check text-xl text-[#F7D525] flex-shrink-0 mt-1"></i>
                                    <div>
                                    <strong className="block text-lg mb-1">Profissionalização</strong>
                                    <span className="text-sm text-blue-200 leading-relaxed">Processos estruturados, ferramentas premium e tecnologias avançadas.</span>
                                    </div>
                                </li>
                                <li className="flex items-start gap-4">
                                    <i className="fa-solid fa-circle-check text-xl text-[#F7D525] flex-shrink-0 mt-1"></i>
                                    <div>
                                    <strong className="block text-lg mb-1">Equipe Especializada</strong>
                                    <span className="text-sm text-blue-200 leading-relaxed">Estrategista, Designer, Copywriter, Gestor de Tráfego e Editor de Vídeo operando em conjunto.</span>
                                    </div>
                                </li>
                                <li className="flex items-start gap-4">
                                    <i className="fa-solid fa-circle-check text-xl text-[#F7D525] flex-shrink-0 mt-1"></i>
                                    <div>
                                    <strong className="block text-lg mb-1">Foco no ROI</strong>
                                    <span className="text-sm text-blue-200 leading-relaxed">Aumento de faturamento, crescimento sustentável e fortalecimento da marca.</span>
                                    </div>
                                </li>
                                </ul>
                                <div className="mt-10 p-4 bg-white/10 rounded-xl border border-white/20 text-center backdrop-blur-sm">
                                <p className="font-bold text-[#F7D525] italic">"O Conteúdo é rei, mas a Estratégia é a rainha"</p>
                                </div>
                            </div>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* CONTEÚDO: O DESAFIO */}
                    {activeTab === 'desafio' && (
                        <div className="p-6 md:p-12 lg:p-20 max-w-6xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-[#1B4381] text-white text-xs font-bold uppercase tracking-wider mb-6">
                            Diagnóstico
                        </div>
                        <h2 className="text-3xl md:text-4xl font-extrabold text-[#1B4381] mb-4">O Desafio Atual da Lopti</h2>
                        <p className="text-xl text-slate-600 mb-12 border-l-4 border-[#F7D525] pl-4 py-1">
                            No mercado de IA Jurídica brasileiro, a inovação precisa ser <strong className="text-[#1B4381]">vista</strong> para ser comprada.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {/* O Problema */}
                            <div className="bg-white rounded-3xl p-8 md:p-10 border border-slate-200 shadow-sm flex flex-col h-full hover:shadow-md transition-shadow">
                            <div className="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center mb-8 border border-red-100">
                                <i className="fa-solid fa-shield-halved text-3xl text-red-500"></i>
                            </div>
                            <h3 className="text-2xl font-bold mb-4 text-[#1B4381]">O Problema</h3>
                            <p className="text-slate-600 mb-6 leading-relaxed text-lg">
                                A Lopti possui uma solução tecnológica genuinamente inovadora. Porém, enfrenta um desafio crítico: <span className="bg-red-50 text-red-700 font-semibold px-2 py-0.5 rounded">invisibilidade digital num mercado que decide online.</span>
                            </p>
                            <p className="text-slate-600 leading-relaxed">
                                O problema não é falta de produto ou valor, é a falta de comunicação estratégica. O investimento atual ocorre de forma amadora, com conteúdos desconectados e sem estratégia de funil, resultando num CAC inflacionado.
                            </p>
                            </div>

                            {/* A Oportunidade */}
                            <div className="bg-white rounded-3xl p-8 md:p-10 border-2 border-[#1B4381]/10 shadow-sm flex flex-col h-full relative overflow-hidden">
                            <div className="absolute -right-8 -bottom-8 opacity-5">
                                <i className="fa-solid fa-arrow-trend-up text-[15rem] text-[#1B4381]"></i>
                            </div>
                            <div className="relative z-10">
                                <div className="w-16 h-16 bg-[#F7D525]/20 rounded-2xl flex items-center justify-center mb-8 border border-[#F7D525]/30">
                                <i className="fa-solid fa-arrow-trend-up text-3xl text-[#1B4381]"></i>
                                </div>
                                <h3 className="text-2xl font-bold mb-4 text-[#1B4381]">A Oportunidade</h3>
                                <p className="text-slate-600 mb-8 leading-relaxed text-lg">
                                Enquanto os concorrentes dominam a narrativa com marketing integrado, a Lopti permanece desconhecida para os <strong className="text-[#1B4381]">1,3 milhões de advogados brasileiros</strong>.
                                </p>
                                <div className="p-5 bg-[#1B4381] rounded-2xl shadow-inner mt-auto">
                                <p className="font-semibold text-white leading-relaxed">
                                    A nossa proposta visa substituir o amadorismo por uma operação de elite, integrando neuroestratégia e gestão profissional para consolidar a Lopti como a <strong className="text-[#F7D525]">autoridade máxima do setor e reduzir drasticamente o CAC.</strong>
                                </p>
                                </div>
                            </div>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* CONTEÚDO: A SOLUÇÃO */}
                    {activeTab === 'solucao' && (
                        <div className="p-6 md:p-12 lg:p-20 max-w-6xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-[#1B4381] text-white text-xs font-bold uppercase tracking-wider mb-6">
                            Metodologia
                        </div>
                        <h2 className="text-3xl md:text-4xl font-extrabold text-[#1B4381] mb-4">A Solução Connect Minds</h2>
                        <p className="text-lg text-slate-600 mb-16 max-w-3xl">
                            A nossa atuação é dividida em duas etapas fundamentais para garantir que cada centavo investido retorne em valor de marca e vendas.
                        </p>

                        <div className="space-y-12">
                            {/* Fase 01 */}
                            <div className="bg-white rounded-3xl p-8 md:p-10 shadow-sm border border-slate-200 border-l-8 border-l-[#1B4381] relative">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                                <div>
                                <h3 className="text-2xl font-bold text-[#1B4381]">Fase 01: Inteligência & Estratégia</h3>
                                <p className="text-[#1B4381] font-bold text-sm uppercase mt-2 opacity-70">A Construção do Projeto</p>
                                </div>
                                <div className="bg-slate-100 text-[#1B4381] text-sm font-bold px-4 py-2 rounded-lg self-start md:self-auto whitespace-nowrap">
                                Prazo: 10 dias úteis
                                </div>
                            </div>
                            
                            <p className="text-slate-600 mb-8 text-lg">Antes da execução, criamos a "planta baixa" do seu sucesso. O que entregamos:</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <strong className="flex items-center gap-2 text-[#1B4381] text-lg mb-2">
                                    <span className="w-6 h-6 rounded-full bg-[#F7D525] flex items-center justify-center text-xs text-[#1B4381]">1</span> Estudo de Personas
                                </strong>
                                <p className="text-sm text-slate-600">Mapeamento psicológico dos tomadores de decisão jurídicos.</p>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <strong className="flex items-center gap-2 text-[#1B4381] text-lg mb-2">
                                    <span className="w-6 h-6 rounded-full bg-[#F7D525] flex items-center justify-center text-xs text-[#1B4381]">2</span> Análise de Concorrência
                                </strong>
                                <p className="text-sm text-slate-600">Identificação de brechas deixadas por MinutalA, Jusfy e outros.</p>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <strong className="flex items-center gap-2 text-[#1B4381] text-lg mb-2">
                                    <span className="w-6 h-6 rounded-full bg-[#F7D525] flex items-center justify-center text-xs text-[#1B4381]">3</span> Linha Editorial & Copy
                                </strong>
                                <p className="text-sm text-slate-600">Adequação da comunicação e definição do tom de voz que converte, educa e gera autoridade.</p>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <strong className="flex items-center gap-2 text-[#1B4381] text-lg mb-2">
                                    <span className="w-6 h-6 rounded-full bg-[#F7D525] flex items-center justify-center text-xs text-[#1B4381]">4</span> Estratégia Digital
                                </strong>
                                <p className="text-sm text-slate-600">Estruturação técnica para criação de conteúdos intencionais explorando todo o funil de vendas e elevando o nível de consciência das personas.</p>
                                </div>
                            </div>
                            </div>

                            {/* Separador Visual */}
                            <div className="flex justify-center -my-4 relative z-10">
                            <div className="w-12 h-12 bg-white rounded-full border border-slate-200 shadow-sm flex items-center justify-center text-slate-400">
                                <i className="fa-solid fa-arrow-right rotate-90 text-xl"></i>
                            </div>
                            </div>

                            {/* Fase 02 */}
                            <div className="bg-white rounded-3xl p-8 md:p-10 shadow-sm border border-slate-200 border-l-8 border-l-[#F7D525] relative">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                                <div>
                                <h3 className="text-2xl font-bold text-[#1B4381]">Fase 02: Execução Contínua em 2 Frentes</h3>
                                <p className="text-[#1B4381] font-bold text-sm uppercase mt-2 opacity-70">Redes Sociais + Tráfego Pago</p>
                                </div>
                                <div className="bg-[#F7D525] text-[#1B4381] text-sm font-bold px-4 py-2 rounded-lg self-start md:self-auto whitespace-nowrap shadow-sm">
                                Serviços Paralelos
                                </div>
                            </div>

                            {/* Destaque Equipe Especializada Global para a Fase 02 */}
                            <div className="bg-[#1B4381]/5 p-6 md:p-8 rounded-2xl border border-[#1B4381]/10 mb-10">
                                <h4 className="text-lg md:text-xl font-bold text-[#1B4381] mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-users text-[#F7D525]"></i> O Poder de uma Equipe de Especialistas
                                </h4>
                                <p className="text-slate-600 mb-6 text-lg leading-relaxed">
                                Para obter o resultado desejado e posicionar a Lopti como uma verdadeira referência no mercado, não basta ter apenas 1 ou 2 profissionais. A nossa execução em <strong className="text-[#1B4381]">ambas as frentes</strong> (Tráfego Orgânico e Pago) exige uma equipe especializada trabalhando em total sintonia e profissionalismo:
                                </p>
                                <div className="flex flex-wrap gap-3">
                                <span className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-[#1B4381] shadow-sm">Estrategista Digital</span>
                                <span className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-[#1B4381] shadow-sm">Gestor de Tráfego</span>
                                <span className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-[#1B4381] shadow-sm">Copywriter (Neurociência)</span>
                                <span className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-[#1B4381] shadow-sm">Designers</span>
                                <span className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-[#1B4381] shadow-sm">Editores de Vídeo</span>
                                </div>
                            </div>
                            
                            <div className="mb-10 pl-2 md:pl-4 border-l-4 border-slate-100">
                                <h4 className="text-xl font-bold text-[#1B4381] mb-4">Frente 1: Gestão Profissional das Redes Sociais</h4>
                                <p className="text-slate-600 text-lg leading-relaxed mb-4">
                                Muito além de simples publicações, garantimos a <strong>estruturação profissional do perfil</strong> e a <strong>otimização de SEO</strong> das suas redes para maximizar a descoberta orgânica. 
                                </p>
                                <p className="text-slate-600 text-lg leading-relaxed">
                                A equipe de design, copy e estratégia desenvolve a criação de conteúdos estratégicos, molda os destaques essenciais como vitrine da marca e assegura uma comunicação extremamente assertiva e envolvente com a sua audiência.
                                </p>
                            </div>

                            <div className="mb-10 pl-2 md:pl-4 border-l-4 border-slate-100">
                                <h4 className="text-xl font-bold text-[#1B4381] mb-4">Frente 2: Gestão de Tráfego Pago</h4>
                                <p className="text-slate-600 text-lg leading-relaxed">
                                Criação, monitoramento e otimização contínua de campanhas de anúncios (Meta Ads, Google Ads). Atuando em sinergia, os nossos copywriters e designers produzem criativos altamente persuasivos para que a compra de atenção do público hiper-segmentado seja direcionada para a Lopti com foco agressivo na conversão.
                                </p>
                            </div>

                            {/* Destaque Tráfego Pago / Sinergia */}
                            <div className="bg-gradient-to-r from-[#1B4381] to-[#122e5c] rounded-2xl p-6 md:p-8 text-white shadow-lg flex items-start gap-6 relative overflow-hidden mt-12">
                                <div className="absolute right-0 top-0 opacity-10">
                                <i className="fa-solid fa-bolt text-[10rem] text-[#F7D525]"></i>
                                </div>
                                <div className="bg-[#F7D525] p-3 rounded-xl shadow-md hidden sm:block relative z-10">
                                <i className="fa-solid fa-rocket text-2xl text-[#1B4381]"></i>
                                </div>
                                <div className="relative z-10">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-[#F7D525] p-2 rounded-lg shadow-md sm:hidden">
                                    <i className="fa-solid fa-rocket text-xl text-[#1B4381]"></i>
                                    </div>
                                    <h4 className="text-xl font-bold text-[#F7D525]">Sinergia de Sucesso: Redes + Tráfego</h4>
                                </div>
                                <p className="text-blue-100 leading-relaxed text-lg mt-4">
                                    Contratar apenas a gestão de tráfego é como convidar pessoas para uma festa numa casa em obras. A Gestão de Redes Sociais prepara o ambiente: gera autoridade, quebra objeções e retém o lead. Quando o tráfego chega, este encontra uma marca sólida, o que aumenta drasticamente a taxa de conversão e justifica o investimento em mídia.
                                </p>
                                </div>
                            </div>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* CONTEÚDO: INVESTIMENTO */}
                    {activeTab === 'investimento' && (
                        <div className="p-6 md:p-12 lg:p-20 max-w-7xl mx-auto flex flex-col min-h-full">
                        
                        <div className="mb-12">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-[#1B4381] text-white text-xs font-bold uppercase tracking-wider mb-6">
                            Proposta de Valor
                            </div>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-[#1B4381] mb-4">Investimentos e Condições</h2>
                            <p className="text-slate-600 text-lg">Estrutura financeira transparente desenhada para escalar o crescimento da Lopti.</p>
                        </div>

                        {/* Tabela App-like */}
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-12">
                            {/* Linha 1 */}
                            <div className="p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-100 hover:bg-slate-50 transition-colors">
                            <div className="flex-1">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Serviço Único</span>
                                <h3 className="text-xl font-bold text-[#1B4381] mb-2">Fase 01: Inteligência & Estratégia</h3>
                                <div className="inline-flex items-center gap-2 text-[#1B4381] font-bold text-sm bg-[#F7D525]/20 px-3 py-1.5 rounded-md border border-[#F7D525]/50">
                                <i className="fa-solid fa-circle-check text-yellow-600"></i>
                                <span className="text-yellow-700">BÔNUS: 100% isento com contrato de 12 meses</span>
                                </div>
                            </div>
                            <div className="text-left md:text-right">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Taxa Única</span>
                                <div className="text-2xl font-bold text-slate-800 line-through opacity-50">R$ 3.500,00</div>
                            </div>
                            </div>

                            {/* Linha 2 */}
                            <div className="p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-100 hover:bg-slate-50 transition-colors">
                            <div className="flex-1">
                                <span className="text-xs font-bold text-[#1B4381] uppercase tracking-wider block mb-1">Serviço Contínuo 1</span>
                                <h3 className="text-xl font-bold text-[#1B4381] mb-2">Gestão Completa de Redes Sociais</h3>
                                <p className="text-slate-600 text-sm">Equipe multidisciplinar alocada: Estrategista, Designer, Editor e Copywriter.</p>
                            </div>
                            <div className="text-left md:text-right">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Investimento Mensal</span>
                                <div className="text-3xl font-extrabold text-[#1B4381]">R$ 4.500<span className="text-lg text-slate-500 font-medium">,00</span></div>
                            </div>
                            </div>

                            {/* Linha 3 */}
                            <div className="p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:bg-slate-50 transition-colors">
                            <div className="flex-1">
                                <span className="text-xs font-bold text-[#1B4381] uppercase tracking-wider block mb-1">Serviço Contínuo 2</span>
                                <div className="flex items-center gap-3 mb-2">
                                <h3 className="text-xl font-bold text-[#1B4381]">Gestão de Tráfego Pago</h3>
                                </div>
                                <p className="text-slate-600 text-sm mb-3">Estruturação e otimização contínua de campanhas de conversão com suporte de design e copy.</p>
                            </div>
                            <div className="text-left md:text-right">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Taxa de Gestão Mensal</span>
                                <div className="text-2xl font-bold text-slate-800">4% <span className="text-sm font-medium text-slate-500 block md:inline">do invest. em anúncios</span></div>
                                <span className="inline-block mt-2 text-xs font-bold text-slate-500 bg-slate-100 border border-slate-200 rounded px-2 py-1">Valor mínimo da gestão: R$ 6.500,00/mês</span>
                            </div>
                            </div>
                        </div>

                        {/* Condições e CTA */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
                            <div className="lg:col-span-2 bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
                            <h4 className="text-lg font-bold text-[#1B4381] mb-6 flex items-center gap-2">
                                <i className="fa-solid fa-table-columns text-xl text-[#F7D525]"></i> Termos Comerciais
                            </h4>
                            <ul className="space-y-4">
                                <li className="flex items-start gap-3">
                                <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-[#F7D525] flex-shrink-0"></div>
                                <span className="text-slate-600"><strong className="text-slate-800">Pagamento:</strong> Faturamento via PIX antecipado ao mês de prestação, com emissão de Nota Fiscal de Serviço para a Lopti.</span>
                                </li>
                                <li className="flex items-start gap-3">
                                <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-[#F7D525] flex-shrink-0"></div>
                                <span className="text-slate-600"><strong className="text-slate-800">Contrato:</strong> Período mínimo de 12 meses para garantia da isenção total da Fase 01.</span>
                                </li>
                                <li className="flex items-start gap-3">
                                <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-[#F7D525] flex-shrink-0"></div>
                                <span className="text-slate-600"><strong className="text-slate-800">Onboarding:</strong> Início imediato após assinatura e compartilhamento de acessos.</span>
                                </li>
                            </ul>
                            </div>

                            <div className="bg-[#1B4381] rounded-3xl p-8 flex flex-col justify-center items-center text-center shadow-md">
                            <h4 className="text-xl font-bold text-white mb-2">Pronto para avançar?</h4>
                            <p className="text-blue-200 text-sm mb-8">Formalize o acordo e inicie a escala da Lopti.</p>
                            <button 
                                onClick={() => alert("Ação: Redirecionar para assinatura/WhatsApp")}
                                className="w-full bg-[#F7D525] hover:bg-yellow-400 text-[#1B4381] font-bold py-4 px-6 rounded-xl shadow-lg transition-transform hover:-translate-y-1 flex justify-center items-center gap-2"
                            >
                                Aprovar Proposta <i className="fa-solid fa-circle-check text-lg"></i>
                            </button>
                            </div>
                        </div>

                        {/* Rodapé / Diferenciais */}
                        <div className="mt-auto pt-10 border-t border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-center md:text-left">
                                <button 
                                onClick={() => handleNavClick('porque')}
                                className="inline-flex items-center gap-2 text-[#1B4381] font-bold hover:text-yellow-600 transition-colors group"
                                >
                                Descubra por que escolher a Connect Minds <i className="fa-solid fa-arrow-right text-lg group-hover:translate-x-1 transition-transform ml-2"></i>
                                </button>
                            </div>
                            <div className="flex flex-col items-center md:items-end">
                                <img src={logoUrl} alt="Connect Minds Logo Footer" className="h-6 w-auto object-contain opacity-80 mb-2" />
                                <p className="text-[10px] text-slate-400">© {new Date().getFullYear()} Connect Minds. Documento Confidencial.</p>
                            </div>
                            </div>
                        </div>

                        </div>
                    )}

                    {/* CONTEÚDO: POR QUE NÓS */}
                    {activeTab === 'porque' && (
                        <div className="p-6 md:p-12 lg:p-20 max-w-7xl mx-auto flex flex-col min-h-full">
                        <div className="mb-12">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-md bg-[#1B4381] text-white text-xs font-bold uppercase tracking-wider mb-6">
                            Nossos Diferenciais
                            </div>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-[#1B4381] mb-6">Por que nós?</h2>
                            <p className="text-xl text-slate-600 mb-12 border-l-4 border-[#F7D525] pl-4 py-1">
                            Diferente de agências tradicionais que focam em métricas de vaidade (likes), nós focamos em <strong className="text-[#1B4381]">Conectar Mentes</strong>.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 gap-8 mb-16 max-w-5xl mx-auto">
                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row items-start md:items-center gap-8">
                            <div className="w-20 h-20 flex-shrink-0 bg-[#1B4381]/10 rounded-2xl flex items-center justify-center border border-[#1B4381]/20">
                                <i className="fa-solid fa-bullseye text-3xl text-[#1B4381]"></i>
                            </div>
                            <div>
                                <h4 className="text-2xl font-bold text-[#1B4381] mb-3">Suporte Direto</h4>
                                <p className="text-slate-600 leading-relaxed text-lg">
                                Comunicação fluida e ágil diretamente com a liderança da agência. Compreendemos que a confiança é a base de tudo, por isso o nosso compromisso com a comunicação clara e eficaz é inegociável. Garantimos reuniões de alinhamento periódicas, suporte dedicado via WhatsApp nos dias úteis e total facilidade de acesso à nossa direção. Connosco, não há intermediários a dificultar o processo: a sua marca tem a nossa atenção primária.
                                </p>
                            </div>
                            </div>

                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row items-start md:items-center gap-8">
                            <div className="w-20 h-20 flex-shrink-0 bg-[#F7D525]/20 rounded-2xl flex items-center justify-center border border-[#F7D525]/40">
                                <i className="fa-solid fa-chart-column text-3xl text-[#1B4381]"></i>
                            </div>
                            <div>
                                <h4 className="text-2xl font-bold text-[#1B4381] mb-3">Eficiência de Custo</h4>
                                <p className="text-slate-600 leading-relaxed text-lg">
                                Uma equipe interna com esses 5 especialistas custaria à Lopti <strong className="text-[#1B4381]">de R$ 30.000,00 a R$ 50.000,00/mês</strong>. Fornecemos uma estrutura premium e multidisciplinar por uma fração desse custo.
                                </p>
                            </div>
                            </div>

                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row items-start md:items-center gap-8">
                            <div className="w-20 h-20 flex-shrink-0 bg-[#1B4381]/10 rounded-2xl flex items-center justify-center border border-[#1B4381]/20">
                                <i className="fa-solid fa-users text-3xl text-[#1B4381]"></i>
                            </div>
                            <div>
                                <h4 className="text-2xl font-bold text-[#1B4381] mb-3">Personalização Estratégica</h4>
                                <p className="text-slate-600 leading-relaxed text-lg">
                                Não trabalhamos com pacotes prontos ou fórmulas padrão. Cada estratégia é única e desenvolvida especialmente para o cliente, considerando rigorosamente todas as suas particularidades. É com este nível de dedicação que conseguimos garantir eficiência e solidez nos resultados.
                                </p>
                            </div>
                            </div>
                        </div>

                        {/* Rodapé Simplificado */}
                        <div className="mt-auto pt-10 border-t border-slate-200 flex flex-col items-center justify-center">
                            <img src={logoUrl} alt="Connect Minds Logo Footer" className="h-8 w-auto object-contain opacity-80 mb-3" />
                            <p className="text-xs text-slate-400">© {new Date().getFullYear()} Connect Minds. Documento Confidencial.</p>
                        </div>
                        </div>
                    )}

                    </div>
                </main>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
